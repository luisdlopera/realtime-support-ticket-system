version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: support-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: support
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d support"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - support-network
    # No expone puerto al exterior - solo interno

  # Redis Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: support-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - support-network
    # No expone puerto al exterior - solo interno

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        - NODE_ENV=production
    container_name: support-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      # Rate limiting
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOGIN_WINDOW_MS: ${LOGIN_WINDOW_MS:-900000}
      # Email
      EMAIL_SERVICE: ${EMAIL_SERVICE:-console}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@support.local}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      # WhatsApp
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_GRAPH_VERSION: ${WHATSAPP_GRAPH_VERSION:-v21.0}
      # R2 Storage
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL}
      R2_SIGNED_TTL: ${R2_SIGNED_TTL:-3600}
      # Demo users (set to false in production)
      CREATE_DEMO_USERS: ${CREATE_DEMO_USERS:-false}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
      # Version
      npm_package_version: ${npm_package_version:-1.0.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - support-network
    # No expone puerto al exterior - usa reverse proxy (nginx/traefik)

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    container_name: support-frontend-prod
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - support-network
    # No expone puerto al exterior - usa reverse proxy (nginx/traefik)

  # Backup service (runs daily at 2 AM)
  backup:
    image: postgres:16-alpine
    container_name: support-backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_DB: support
    volumes:
      - ./backups:/backups
    command: >
      sh -c '
        while true; do
          current_hour=$$(date +%H)
          if [ "$$current_hour" = "02" ]; then
            echo "[Backup] Starting backup at $$(date)"
            pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER -d $$POSTGRES_DB -F c -f /backups/support_$$(date +%Y%m%d_%H%M%S).dump
            echo "[Backup] Completed"
            # Remove backups older than 7 days
            find /backups -name "support_*.dump" -mtime +7 -delete
          fi
          sleep 3600
        done
      '
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - support-network

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  support-network:
    driver: bridge
